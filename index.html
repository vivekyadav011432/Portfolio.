/* ── WAVE CANVAS ─────────────────────────────────────── */
function WaveCanvas() {
  const ref = useRef();
  useEffect(() => {
    const c = ref.current, ctx = c.getContext("2d"); let raf, t = 0;
    const resize = () => { c.width = c.offsetWidth; c.height = c.offsetHeight; };
    resize(); window.addEventListener("resize", resize);
    const draw = () => {
      ctx.clearRect(0,0,c.width,c.height);
      for (let w=0;w<18;w++) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(${120+w*6},${40+w*3},255,${0.06+w*0.012})`;
        ctx.lineWidth = 1;
        for (let x=0;x<=c.width;x+=3) {
          const y = c.height*0.5 + Math.sin((x/c.width)*Math.PI*3+t+w*0.4)*(60+w*14) + Math.cos((x/c.width)*Math.PI*2+t*0.7+w*0.2)*(30+w*6);
          x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      t += 0.012; raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize",resize); };
  },[]);
  return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.7}}/>;
}

/* ── FLOATING 3D ICOSAHEDRON (above code editor) ──────── */
function Float3D() {
  const ref = useRef();
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const W = el.clientWidth, H = el.clientHeight;
    const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(W,H); el.appendChild(renderer.domElement);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60,W/H,0.1,100); camera.position.set(0,0,3.6);
    scene.add(new THREE.AmbientLight(0xffffff,0.4));
    const d1 = new THREE.DirectionalLight(0x7b2fff,5); d1.position.set(2,3,2); scene.add(d1);
    const d2 = new THREE.DirectionalLight(0x00c3ff,4); d2.position.set(-2,-1,2); scene.add(d2);
    const d3 = new THREE.PointLight(0xff00cc,3,10); d3.position.set(0,2,1); scene.add(d3);

    // Core icosahedron
    const core = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.9,1),
      new THREE.MeshStandardMaterial({color:0x7b2fff,metalness:0.8,roughness:0.15,emissive:0x220066,emissiveIntensity:0.5})
    ); scene.add(core);
    // Wire overlay
    scene.add(new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.96,1),
      new THREE.MeshBasicMaterial({color:0x00c3ff,wireframe:true,transparent:true,opacity:0.2})
    ));
    // Outer glow shell
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.2,16,16),
      new THREE.MeshBasicMaterial({color:0x7b2fff,transparent:true,opacity:0.04,side:THREE.BackSide,blending:THREE.AdditiveBlending})
    ));
    // Rings
    const ringGroup = new THREE.Group();
    [[0x7b2fff,1.45,0],[0x00c3ff,1.58,1.1],[0xff00cc,1.68,2.0]].forEach(([col,r,rx])=>{
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(r,0.016,8,80),
        new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending})
      ); ring.rotation.x = rx; ringGroup.add(ring);
    }); scene.add(ringGroup);
    // Particles
    const pts = new Float32Array(240*3);
    for (let i=0;i<240;i++){const a=Math.random()*Math.PI*2,r=1.7+Math.random()*0.5;pts[i*3]=Math.cos(a)*r;pts[i*3+1]=(Math.random()-0.5)*1.8;pts[i*3+2]=Math.sin(a)*r;}
    const pGeo = new THREE.BufferGeometry(); pGeo.setAttribute("position",new THREE.BufferAttribute(pts,3));
    scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({size:0.035,color:0x00c3ff,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending})));

    let raf, t=0;
    const animate = () => {
      raf = requestAnimationFrame(animate); t += 0.01;
      core.rotation.x += 0.008; core.rotation.y += 0.012;
      ringGroup.rotation.y += 0.006; ringGroup.rotation.x += 0.003;
      core.position.y = Math.sin(t)*0.08;
      d3.intensity = 2.5+Math.sin(t*2)*1.2;
      renderer.render(scene,camera);
    };
    animate();
    return () => { cancelAnimationFrame(raf); renderer.dispose(); if(el.contains(renderer.domElement)) el.removeChild(renderer.domElement); };
  },[]);
  return <div ref={ref} style={{width:"100%",height:"100%"}}/>;
}

/* ── 3D PLANET (Contact) ─────────────────────────────── */
function Planet3D() {
  const ref = useRef();
  useEffect(() => {
    const el=ref.current; const W=el.clientWidth,H=el.clientHeight;
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(W,H); el.appendChild(renderer.domElement);
    const scene=new THREE.Scene(), camera=new THREE.PerspectiveCamera(50,W/H,0.1,100);
    camera.position.set(0,0,5);
    scene.add(new THREE.AmbientLight(0xffffff,0.3));
    const d1=new THREE.DirectionalLight(0x9966ff,3); d1.position.set(3,3,3); scene.add(d1);
    const d2=new THREE.DirectionalLight(0x00c3ff,2); d2.position.set(-3,-1,2); scene.add(d2);
    const group=new THREE.Group();
    const baseMat=new THREE.MeshStandardMaterial({color:0x88ccaa,metalness:0.6,roughness:0.3,emissive:0x113322,emissiveIntensity:0.2});
    for(let i=0;i<24;i++){const angle=(i/24)*Math.PI*2,r=1.4+Math.random()*0.3;const mat=baseMat.clone();mat.color.setHSL(0.35+Math.random()*0.15,0.5,0.4+Math.random()*0.2);const m=new THREE.Mesh(new THREE.SphereGeometry(0.18+Math.random()*0.12,6,6),mat);m.position.set(Math.cos(angle)*r,(Math.random()-0.5)*2.2,Math.sin(angle)*r*0.6);m.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,0);group.add(m);}
    group.add(new THREE.Mesh(new THREE.SphereGeometry(1.0,32,32),new THREE.MeshStandardMaterial({color:0x224433,metalness:0.8,roughness:0.2,emissive:0x112211,emissiveIntensity:0.3})));
    const ring=new THREE.Mesh(new THREE.TorusGeometry(1.8,0.03,8,100),new THREE.MeshBasicMaterial({color:0x9966ff,opacity:0.4,transparent:true}));
    ring.rotation.x=1.1; group.add(ring); scene.add(group);
    let raf;
    const animate=()=>{raf=requestAnimationFrame(animate);group.rotation.y+=0.006;group.rotation.x+=0.001;renderer.render(scene,camera);};
    animate();
    return()=>{cancelAnimationFrame(raf);renderer.dispose();if(el.contains(renderer.domElement))el.removeChild(renderer.domElement);};
  },[]);
  return <div ref={ref} style={{width:"100%",height:"100%",position:"absolute",top:0,right:0}}/>;
}
